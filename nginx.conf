server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Health check endpoint (returns 200 for Docker/LB probes)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache icons and images
    location ~* \.(ico|png|svg|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker - must never be cached
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /registerSW.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PWA manifest
    location = /manifest.webmanifest {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable server version in response headers
    server_tokens off;
}
