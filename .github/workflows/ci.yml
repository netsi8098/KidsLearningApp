# ============================================================
# Kids Learning Fun - Primary CI Pipeline
# Runs on every PR and push to main/develop
# Uses change detection to skip unaffected packages
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-key-for-testing
  DATABASE_URL: postgresql://test:test@localhost:5432/test_db
  REDIS_URL: redis://localhost:6379/1
  CORS_ORIGIN: http://localhost:5173

jobs:
  # ── Detect what changed ────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      admin: ${{ steps.filter.outputs.admin }}
      e2e: ${{ steps.filter.outputs.e2e }}
      infra: ${{ steps.filter.outputs.infra }}
      prisma: ${{ steps.filter.outputs.prisma }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'index.html'
              - 'eslint.config.js'
            backend:
              - 'backend/**'
            admin:
              - 'admin/**'
            e2e:
              - 'e2e/**'
              - '.github/workflows/**'
            infra:
              - 'docker-compose*.yml'
              - '**/Dockerfile*'
              - 'nginx.conf'
              - '.github/workflows/**'
            prisma:
              - 'backend/prisma/**'

  # ── Install and cache dependencies ─────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache root node_modules
        id: cache-root
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            root-deps-${{ runner.os }}-

      - name: Cache backend node_modules
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Cache admin node_modules
        id: cache-admin
        uses: actions/cache@v4
        with:
          path: admin/node_modules
          key: admin-deps-${{ runner.os }}-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: |
            admin-deps-${{ runner.os }}-

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install backend dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        working-directory: backend
        run: npm ci

      - name: Install admin dependencies
        if: steps.cache-admin.outputs.cache-hit != 'true'
        working-directory: admin
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

  # ── Lint & Typecheck (always runs, fast fail) ──────────────
  lint:
    name: Lint & Typecheck
    needs: [install, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            root-deps-${{ runner.os }}-

      - name: Restore backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Restore admin node_modules
        uses: actions/cache@v4
        with:
          path: admin/node_modules
          key: admin-deps-${{ runner.os }}-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: |
            admin-deps-${{ runner.os }}-

      - name: Install root deps (if cache miss)
        run: |
          if [ ! -d "node_modules" ]; then npm ci; fi

      - name: Install backend deps (if cache miss)
        run: |
          if [ ! -d "backend/node_modules" ]; then cd backend && npm ci; fi

      - name: Install admin deps (if cache miss)
        run: |
          if [ ! -d "admin/node_modules" ]; then cd admin && npm ci; fi

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Lint frontend
        if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
        run: npx eslint . --max-warnings 0 || true

      - name: Typecheck frontend
        if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
        run: npx tsc --noEmit

      - name: Typecheck backend
        if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        working-directory: backend
        run: npx tsc --noEmit

      - name: Typecheck admin
        if: needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main'
        working-directory: admin
        run: npx tsc --noEmit

  # ── Backend Tests ──────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    needs: [install, changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Install backend deps (if cache miss)
        run: |
          if [ ! -d "backend/node_modules" ]; then cd backend && npm ci; fi

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run unit tests
        working-directory: backend
        run: npx vitest run tests/unit/ --reporter=default --reporter=junit --outputFile=junit-unit.xml

      - name: Run integration tests
        working-directory: backend
        run: npx vitest run tests/integration/ --reporter=default --reporter=junit --outputFile=junit-integration.xml

      - name: Run contract tests
        working-directory: backend
        run: npx vitest run tests/contract/ --reporter=default --reporter=junit --outputFile=junit-contract.xml
        continue-on-error: true

      - name: Run tests with coverage
        working-directory: backend
        run: npx vitest run --coverage --reporter=default

      - name: Run smoke tests
        working-directory: backend
        run: npx vitest run tests/certification/smoke.test.ts --reporter=default

      - name: Run release certification
        working-directory: backend
        run: npx vitest run tests/certification/release-certification.test.ts --reporter=default --reporter=junit --outputFile=junit-certification.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/junit-*.xml
            backend/coverage/
          retention-days: 30

      - name: Coverage summary
        if: always()
        working-directory: backend
        run: |
          if [ -f coverage/text-summary.txt ]; then
            cat coverage/text-summary.txt
          fi

  # ── Frontend Tests ─────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    needs: [install, changes]
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            root-deps-${{ runner.os }}-

      - name: Install deps (if cache miss)
        run: |
          if [ ! -d "node_modules" ]; then npm ci; fi

      - name: Run frontend tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=junit-frontend.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: junit-frontend.xml
          retention-days: 30

  # ── Admin Tests ────────────────────────────────────────────
  admin-tests:
    name: Admin Tests
    needs: [install, changes]
    if: needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore admin node_modules
        uses: actions/cache@v4
        with:
          path: admin/node_modules
          key: admin-deps-${{ runner.os }}-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: |
            admin-deps-${{ runner.os }}-

      - name: Install deps (if cache miss)
        run: |
          if [ ! -d "admin/node_modules" ]; then cd admin && npm ci; fi

      - name: Run admin tests
        working-directory: admin
        run: npx vitest run --reporter=default --reporter=junit --outputFile=junit-admin.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-test-results
          path: admin/junit-admin.xml
          retention-days: 30

  # ── Build Verification ─────────────────────────────────────
  build:
    name: Build Verification
    needs: [install, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            root-deps-${{ runner.os }}-

      - name: Restore backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Restore admin node_modules
        uses: actions/cache@v4
        with:
          path: admin/node_modules
          key: admin-deps-${{ runner.os }}-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: |
            admin-deps-${{ runner.os }}-

      - name: Install root deps (if cache miss)
        run: |
          if [ ! -d "node_modules" ]; then npm ci; fi

      - name: Install backend deps (if cache miss)
        run: |
          if [ ! -d "backend/node_modules" ]; then cd backend && npm ci; fi

      - name: Install admin deps (if cache miss)
        run: |
          if [ ! -d "admin/node_modules" ]; then cd admin && npm ci; fi

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build frontend
        if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
        run: npm run build

      - name: Build backend
        if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
        working-directory: backend
        run: npm run build

      - name: Build admin
        if: needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main'
        working-directory: admin
        run: npm run build

      - name: Check frontend bundle size
        if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
        run: |
          echo "=== Frontend Bundle Size Report ==="
          if [ -d "dist" ]; then
            # Total uncompressed size
            TOTAL_SIZE=$(du -sb dist/ | cut -f1)
            echo "Total dist size: $(( TOTAL_SIZE / 1024 )) KB"

            # Check main JS chunks (gzip estimate)
            for f in dist/assets/*.js; do
              if [ -f "$f" ]; then
                ORIGINAL=$(stat --printf="%s" "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
                GZIPPED=$(gzip -c "$f" | wc -c)
                BASENAME=$(basename "$f")
                echo "  $BASENAME: $(( ORIGINAL / 1024 )) KB ($(( GZIPPED / 1024 )) KB gzip)"

                # Fail if any single JS chunk exceeds 200KB gzipped
                if [ "$GZIPPED" -gt 204800 ]; then
                  echo "::error::Bundle $BASENAME exceeds 200KB gzip limit ($(( GZIPPED / 1024 )) KB)"
                  exit 1
                fi
              fi
            done
            echo "=== All bundles within size limits ==="
          else
            echo "::warning::dist directory not found, skipping size check"
          fi

      - name: Upload build artifacts
        if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ── Migration Safety Check ─────────────────────────────────
  migration-check:
    name: Migration Safety
    needs: [install, changes]
    if: needs.changes.outputs.prisma == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for destructive schema changes
        run: |
          echo "=== Prisma Schema Diff ==="
          DIFF=$(git diff origin/main -- backend/prisma/ || git diff HEAD~1 -- backend/prisma/)
          echo "$DIFF"

          # Check for destructive operations
          DESTRUCTIVE=false
          if echo "$DIFF" | grep -iE '^\+.*DROP|^\+.*DELETE|^\+.*REMOVE'; then
            echo "::warning::Destructive migration detected: DROP/DELETE/REMOVE found in schema changes"
            DESTRUCTIVE=true
          fi

          # Check for column removals in schema.prisma
          if echo "$DIFF" | grep -E '^\-\s+\w+\s+\w+' | grep -v '^\-\-\-'; then
            echo "::warning::Possible field removal detected. Verify this is intentional."
            DESTRUCTIVE=true
          fi

          # Check for renamed models
          if echo "$DIFF" | grep -E '^\-model\s+\w+' && echo "$DIFF" | grep -E '^\+model\s+\w+'; then
            echo "::warning::Model rename detected. Ensure data migration is planned."
          fi

          if [ "$DESTRUCTIVE" = true ]; then
            echo ""
            echo "::warning::Review the changes above carefully. Destructive migrations require explicit approval."
            echo "::notice::Consider adding a rollback migration alongside destructive changes."
          fi

          echo "=== Migration safety check complete ==="

  # ── E2E Smoke Tests ────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke Tests
    needs: [backend-tests, frontend-tests, build]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-e2e')) &&
      (needs.build.result == 'success') &&
      (needs.frontend-tests.result == 'success' || needs.frontend-tests.result == 'skipped') &&
      (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            root-deps-${{ runner.os }}-

      - name: Restore backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Install deps (if cache miss)
        run: |
          if [ ! -d "node_modules" ]; then npm ci; fi
          if [ ! -d "backend/node_modules" ]; then cd backend && npm ci; fi

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Run E2E smoke tests
        run: npx playwright test --config=e2e/playwright.config.ts --project=child-mobile
        env:
          CI: true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            coverage/e2e-report/
            test-results/
          retention-days: 30

  # ── Final Gate ─────────────────────────────────────────────
  ci-status:
    name: CI Status
    if: always()
    needs: [lint, backend-tests, frontend-tests, admin-tests, build, migration-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all results
        run: |
          echo "=== CI Pipeline Results ==="
          echo "Lint & Typecheck:   ${{ needs.lint.result }}"
          echo "Backend Tests:      ${{ needs.backend-tests.result }}"
          echo "Frontend Tests:     ${{ needs.frontend-tests.result }}"
          echo "Admin Tests:        ${{ needs.admin-tests.result }}"
          echo "Build Verification: ${{ needs.build.result }}"
          echo "Migration Check:    ${{ needs.migration-check.result }}"
          echo "=========================="

          # Lint must always pass
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Lint & Typecheck failed"
            exit 1
          fi

          # Build must always pass
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Build verification failed"
            exit 1
          fi

          # Backend tests must pass when they run (not when skipped)
          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "::error::Backend tests failed"
            exit 1
          fi

          # Frontend tests must pass when they run
          if [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "::error::Frontend tests failed"
            exit 1
          fi

          # Admin tests must pass when they run
          if [[ "${{ needs.admin-tests.result }}" == "failure" ]]; then
            echo "::error::Admin tests failed"
            exit 1
          fi

          # Migration check must pass when it runs
          if [[ "${{ needs.migration-check.result }}" == "failure" ]]; then
            echo "::error::Migration safety check failed"
            exit 1
          fi

          echo ""
          echo "All required CI checks passed."
