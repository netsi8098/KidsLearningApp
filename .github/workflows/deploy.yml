# ============================================================
# Kids Learning Fun - Deployment Pipeline
# Triggered by version tags (v*) or manual dispatch
# Builds Docker images and deploys to target environment
# ============================================================

name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - frontend
          - admin
          - api
          - worker

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Determine deploy parameters ────────────────────────────
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.params.outputs.environment }}
      version: ${{ steps.params.outputs.version }}
      deploy-frontend: ${{ steps.params.outputs.deploy-frontend }}
      deploy-admin: ${{ steps.params.outputs.deploy-admin }}
      deploy-api: ${{ steps.params.outputs.deploy-api }}
      deploy-worker: ${{ steps.params.outputs.deploy-worker }}
    steps:
      - name: Determine parameters
        id: params
        run: |
          # Determine environment
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            SERVICE="${{ github.event.inputs.service }}"
          else
            # Tag push: extract version, deploy to production
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == *"-rc"* || "$TAG" == *"-beta"* ]]; then
              ENV="staging"
            else
              ENV="production"
            fi
            SERVICE="all"
          fi

          # Determine version tag
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="sha-${GITHUB_SHA::8}"
          fi

          # Determine which services to deploy
          if [[ "$SERVICE" == "all" || "$SERVICE" == "frontend" ]]; then
            echo "deploy-frontend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy-frontend=false" >> $GITHUB_OUTPUT
          fi
          if [[ "$SERVICE" == "all" || "$SERVICE" == "admin" ]]; then
            echo "deploy-admin=true" >> $GITHUB_OUTPUT
          else
            echo "deploy-admin=false" >> $GITHUB_OUTPUT
          fi
          if [[ "$SERVICE" == "all" || "$SERVICE" == "api" ]]; then
            echo "deploy-api=true" >> $GITHUB_OUTPUT
          else
            echo "deploy-api=false" >> $GITHUB_OUTPUT
          fi
          if [[ "$SERVICE" == "all" || "$SERVICE" == "worker" ]]; then
            echo "deploy-worker=true" >> $GITHUB_OUTPUT
          else
            echo "deploy-worker=false" >> $GITHUB_OUTPUT
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "=== Deployment Plan ==="
          echo "Environment: $ENV"
          echo "Version: $VERSION"
          echo "Service: $SERVICE"
          echo "======================"

  # ── Run CI checks before deploying ─────────────────────────
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    # Only run CI gate for manual dispatches (tags already ran CI)
    if: github.event_name == 'workflow_dispatch'

  # ── Build Frontend Docker image ────────────────────────────
  build-frontend:
    name: Build Frontend Image
    needs: [prepare]
    if: needs.prepare.outputs.deploy-frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Build API Docker image ─────────────────────────────────
  build-api:
    name: Build API Image
    needs: [prepare]
    if: needs.prepare.outputs.deploy-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}

  # ── Build Worker Docker image ──────────────────────────────
  build-worker:
    name: Build Worker Image
    needs: [prepare]
    if: needs.prepare.outputs.deploy-worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}

  # ── Build Admin Docker image ───────────────────────────────
  build-admin:
    name: Build Admin Image
    needs: [prepare]
    if: needs.prepare.outputs.deploy-admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}

  # ── Deploy to environment ──────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.prepare.outputs.environment }}
    needs: [prepare, build-frontend, build-api, build-worker, build-admin]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure deployment
        id: config
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"
          case "$ENV" in
            dev)
              echo "url=https://dev.kidslearningfun.app" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "url=https://staging.kidslearningfun.app" >> $GITHUB_OUTPUT
              ;;
            production)
              echo "url=https://kidslearningfun.app" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Run database migrations
        if: needs.prepare.outputs.deploy-api == 'true'
        run: |
          echo "Running Prisma migrations for ${{ needs.prepare.outputs.environment }}..."
          # In production, this would connect to the target database and run:
          # npx prisma migrate deploy
          echo "::notice::Database migrations would run here against ${{ needs.prepare.outputs.environment }} database"

      - name: Deploy services
        id: deploy
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          echo "=== Deploying to $ENV ==="
          echo "Version: $VERSION"
          echo ""

          # In production, this would use your deployment tool (e.g., kubectl, terraform, etc.)
          # Example with kubectl:
          # if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
          #   kubectl set image deployment/frontend frontend=$REGISTRY/$IMAGE_PREFIX/frontend:$VERSION -n $ENV
          # fi
          # if [[ "${{ needs.build-api.result }}" == "success" ]]; then
          #   kubectl set image deployment/api api=$REGISTRY/$IMAGE_PREFIX/api:$VERSION -n $ENV
          # fi
          # if [[ "${{ needs.build-worker.result }}" == "success" ]]; then
          #   kubectl set image deployment/worker worker=$REGISTRY/$IMAGE_PREFIX/worker:$VERSION -n $ENV
          # fi

          echo "::notice::Deployment to $ENV would execute here"

          # Output URL for GitHub environment
          case "$ENV" in
            dev)       echo "url=https://dev.kidslearningfun.app" >> $GITHUB_OUTPUT ;;
            staging)   echo "url=https://staging.kidslearningfun.app" >> $GITHUB_OUTPUT ;;
            production) echo "url=https://kidslearningfun.app" >> $GITHUB_OUTPUT ;;
          esac

      - name: Post-deploy health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10

          # In production, this would curl the health endpoints:
          # curl --fail --retry 5 --retry-delay 10 ${{ steps.deploy.outputs.url }}/health
          echo "::notice::Health check would run against ${{ steps.deploy.outputs.url }}/health"

      - name: Notify deployment
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "Deployment to ${{ needs.prepare.outputs.environment }} succeeded (v${{ needs.prepare.outputs.version }})"
          else
            echo "::error::Deployment to ${{ needs.prepare.outputs.environment }} failed"
          fi

  # ── Rollback (manual trigger only) ─────────────────────────
  rollback:
    name: Rollback
    if: failure() && needs.deploy.result == 'failure'
    needs: [prepare, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Rollback deployment
        run: |
          echo "::warning::Deployment failed. Initiating rollback for ${{ needs.prepare.outputs.environment }}..."
          # In production:
          # kubectl rollout undo deployment/frontend -n $ENV
          # kubectl rollout undo deployment/api -n $ENV
          # kubectl rollout undo deployment/worker -n $ENV
          echo "::notice::Rollback would execute here"
